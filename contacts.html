<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты — AutoMaster</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Шапка сайта -->
    <header class="header">
        <div class="container header-flex">
            <a href="index.html" class="logo">Auto<span>Master</span></a>
            <nav>
                <a href="services.html" class="nav-link">Услуги</a>
                <a href="contacts.html" class="nav-link">Контакты</a>
            </nav>
            <a href="tel:+79242152141" class="call-btn">Позвонить</a>
        </div>
    </header>

    <!-- Основной контент -->
    <main class="container">
        <h2 class="section-title">Как нас найти</h2>

        <div class="contact-card">
            <div class="contact-info">
                <p>📍 <strong>Адрес:</strong> г. Хабаровск, ул. Дикопольцева, д. 12</p>
                <p>⏰ <strong>Режим работы:</strong> Пн-Вс: 9:00 - 21:00</p>
                <p>📞 <strong>Телефон:</strong> <a href="tel:+79999999999" class="phone-link">+7 (999) 999-99-99</a></p>
            </div>

            <hr class="divider">

            <h3 class="form-title">Записаться онлайн</h3>

            <form id="orderForm" class="appointment-form">
                <input type="text" placeholder="Ваше имя" required>
                <input type="tel" placeholder="Номер телефона" required>
                <button type="submit" class="btn-submit">Отправить заявку</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
